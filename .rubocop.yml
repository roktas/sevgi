inherit_from: .rubocop_todo.yml
inherit_gem:
  rubocop-rubyfmt:
    - config/full.yml
inherit_mode:
  merge:
    - Exclude

plugins:
  - "rubocop-rubyfmt"
  - "sevgi-appendix"
  - "rubocop-md"
  - "rubocop-packaging"
  - "rubocop-rake"

Metrics/AbcSize:
  Exclude:
    - "**/test/**/*.rb"
    - "**/*.sevgi"
Metrics/BlockLength:
  Exclude:
    - "**/test/**/*.rb"
    - "**/*.gemspec"
    - "**/*.sevgi"
Metrics/ClassLength:
  Exclude:
    - "**/test/**/*.rb"
    - "**/*.sevgi"
Metrics/MethodLength:
  Exclude:
    - "**/test/**/*.rb"
    - "**/*.sevgi"

# Conventional Rake and hyphenated gem entrypoints cannot use snake_case filenames.
Naming/FileName:
  Exclude:
    - "Rakefile"
    - "appendix/lib/sevgi-appendix.rb"
Naming/MethodName:
  Enabled: false
Naming/MethodParameterName:
  Enabled: false
Naming/BlockForwarding:
  Enabled: false
Style/AsciiComments:
  Enabled: false
Style/ClassMethodsDefinitions:
  EnforcedStyle: def_self
  Enabled: true
Style/ArgumentsForwarding:
  Enabled: false
Style/EmptyClassDefinition:
  Enabled: false
Style/IfUnlessModifier:
  Enabled: false
Style/LambdaCall:
  Enabled: false
Style/MethodCallWithoutArgsParentheses:
  Enabled: false
Style/ModuleFunction:
  Enabled: false
Style/OptionalBooleanParameter:
  Enabled: false
Style/ParallelAssignment:
  Enabled: false
# rubocop-md combines the independent alternatives in this reference.
Style/CombinableLoops:
  Exclude:
    - "appendix/agents/skills/sevgi/references/drawing.md"

# Root build and release collaborators must remain in the Rakefile; top-level source directories are component gems.
Style/OneClassPerFile:
  Exclude:
    - "Rakefile"

AllCops:
  NewCops: enable
  SuggestExtensions: false
  Include:
    - "**/*.rb"
    - "**/*.sevgi"
  Exclude:
    - "vendor/**/*"
    - "_/**/*"
    - "**/_/**/*"
    - "RUBYFMT_NOTES.md"
