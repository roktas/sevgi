inherit_from: .rubocop_todo.yml
inherit_gem:
  rubocop-rubyfmt:
    - config/full.yml
inherit_mode:
  merge:
    - Exclude

plugins:
  - "rubocop-rubyfmt"
  - "rubocop-md"
  - "rubocop-packaging"
  - "rubocop-rake"

Metrics/AbcSize:
  Exclude:
    - "**/test/**/*.rb"
    - "**/*.sevgi"
Metrics/BlockLength:
  Exclude: 
    - "**/test/**/*.rb"
    - "**/*.gemspec"
    - "**/*.sevgi"
Metrics/ClassLength:
  Exclude: 
    - "**/test/**/*.rb"
    - "**/*.sevgi"
Metrics/MethodLength:
  Exclude: 
    - "**/test/**/*.rb"
    - "**/*.sevgi"

Naming/MethodName:
  Enabled: false
Naming/MethodParameterName:
  Enabled: false
Naming/BlockForwarding:
  Enabled: false
Style/AsciiComments:
  Enabled: false
Style/ClassMethodsDefinitions:
  EnforcedStyle: def_self
  Enabled: true
Style/ArgumentsForwarding:
  Enabled: false
Style/EmptyClassDefinition:
  Enabled: false
Style/IfUnlessModifier:
  Enabled: false
Style/LambdaCall:
  Enabled: false
Style/MethodCallWithoutArgsParentheses:
  Enabled: false
Style/ModuleFunction:
  Enabled: false
Style/OptionalBooleanParameter:
  Enabled: false
Style/ParallelAssignment:
  Enabled: false

AllCops:
  NewCops: enable
  SuggestExtensions: false
  Include:
    - "**/*.rb"
    - "**/*.sevgi"
  Exclude:
    - "vendor/**/*"
    - "_/**/*"
    - "**/_/**/*"
    - "RUBYFMT_NOTES.md"
