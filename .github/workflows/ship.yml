name: Ship

on:
  workflow_dispatch:

jobs:
  guard:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
    - name: Guard ref and versions 🧯
      run: ruby -rrake -e 'load "Rakefile"; Rake::Task["release:guard"].invoke'

  verify:
    needs: guard
    if: needs.guard.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
    - name: Native dependencies 🧱
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcairo2-dev \
          libgdk-pixbuf-2.0-dev \
          libgirepository1.0-dev \
          libglib2.0-dev \
          librsvg2-dev \
          pkg-config
    - name: Ruby 🥁
      uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
      with:
        ruby-version: "4.0.6"
        bundler-cache: true
    - name: Lint 🔬
      run: bundle exec rake lint
    - name: Unit 🔬
      run: bundle exec rake test
    - name: API docs 📚
      run: bundle exec rake doc:check
    - name: Build 📦
      run: bundle exec rake build
    - name: Package and remote preflight 🧪
      run: bundle exec rake release:verify
    - name: Upload immutable packages 📤
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: release-packages-${{ github.sha }}
        path: pkg/
        if-no-files-found: error
        overwrite: false

  publish:
    needs: verify
    if: needs.verify.result == 'success'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: "ship-${{ github.ref }}"
      cancel-in-progress: false
    steps:
    - name: Download immutable packages 📥
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: release-packages-${{ github.sha }}
        path: pkg
    - name: Ruby 🥁
      uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
      with:
        ruby-version: "4.0.6"
    - name: Configure RubyGems trusted publishing 🔑
      uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0
    - name: Verify and push packages 💎
      run: |
        set -Eeuo pipefail
        unset CDPATH
        mapfile -t archives < <(awk 'NF == 2 { print $2 }' pkg/SHA256SUMS)
        [[ ${#archives[@]} -gt 0 ]] || { printf 'Empty release manifest\n' >&2; exit 1; }
        [[ ${#archives[@]} -eq $(wc -l < pkg/SHA256SUMS) ]] || { printf 'Malformed release manifest\n' >&2; exit 1; }
        mapfile -t packaged < <(find pkg -maxdepth 1 -type f -name '*.gem' -printf '%f\n' | sort)
        mapfile -t declared < <(printf '%s\n' "${archives[@]}" | sort -u)
        [[ ${#declared[@]} -eq ${#archives[@]} ]] || { printf 'Duplicate release archive\n' >&2; exit 1; }
        diff -u <(printf '%s\n' "${declared[@]}") <(printf '%s\n' "${packaged[@]}")
        (
          cd pkg
          sha256sum -c SHA256SUMS
        )
        for archive in "${archives[@]}"; do
          gem push "pkg/$archive"
        done
