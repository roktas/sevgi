name: Site

on:
  push:
    branches: ["main"]
    paths:
      - "showcase/doc/**"
      - ".github/workflows/site.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "showcase/doc/**"
      - ".github/workflows/site.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: "site-build-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref_name }}"
      cancel-in-progress: true
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build 🥁
        uses: shalzz/zola-deploy-action@74526e63f38f84b82476349bbcd886b82040ff98
        env:
          BUILD_DIR: showcase/doc
          BUILD_ONLY: true

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: site
    concurrency:
      group: "site-deploy-main"
      cancel-in-progress: false
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Deploy 🥁
        uses: shalzz/zola-deploy-action@74526e63f38f84b82476349bbcd886b82040ff98
        env:
          BUILD_DIR: showcase/doc
          PAGES_BRANCH: site
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
