name: Release
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v4
    - name: Native dependencies 🧱
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcairo2-dev \
          libgdk-pixbuf-2.0-dev \
          libgirepository1.0-dev \
          libglib2.0-dev \
          librsvg2-dev \
          pkg-config
    - name: Ruby 🥁
      uses: ruby/setup-ruby@v1
      with: { bundler-cache: true }
    - name: Push 💎
      uses: rubygems/release-gem@v1
      with:
        attestations: false
