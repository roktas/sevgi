name: Test
on:   [push, pull_request, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.4.0", "4.0.5"]
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v6
    - name: Native dependencies 🧱
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcairo2-dev \
          libgdk-pixbuf-2.0-dev \
          libgirepository1.0-dev \
          libglib2.0-dev \
          librsvg2-dev \
          pkg-config
    - name: Ruby 🥁
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - name: Unit 🔬
      run: bundle exec rake test
    - name: API docs 📚
      run: bundle exec rake doc:check
    - name: Upload API docs 📚
      if: matrix.ruby == '4.0.5'
      uses: actions/upload-artifact@v4
      with:
        name: api-docs
        path: .cache/ruby/doc/api
    - name: Build 📦
      run: bundle exec rake build
  coverage:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v6
    - name: Native dependencies 🧱
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libcairo2-dev \
          libgdk-pixbuf-2.0-dev \
          libgirepository1.0-dev \
          libglib2.0-dev \
          librsvg2-dev \
          pkg-config
    - name: Ruby 🥁
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: "4.0.5"
        bundler-cache: true
    - name: Coverage 🧮
      run: bundle exec rake coverage
    - name: Upload coverage 🧮
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: .cache/ruby/coverage
